# Mosquitto MQTT Broker Configuration
# ESP Platform

# --- Listeners ---

# Standard MQTT (TCP)
listener 1883
protocol mqtt

# MQTT over WebSocket (for browser dashboard)
listener 9001
protocol websockets

# --- Authentication ---
# For MVP: allow anonymous (no auth)
# For production: set to false and use password_file
allow_anonymous true

# Uncomment for production auth:
# allow_anonymous false
# password_file /mosquitto/data/passwd

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# --- Connection Settings ---
max_keepalive 120
keepalive_interval 60

# --- Message Settings ---
max_packet_size 65536
message_size_limit 65536

# --- Queue Settings ---
max_queued_messages 1000
queue_qos0_messages false
