; ESP Platform Firmware
; PlatformIO configuration

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed  = 115200
upload_speed   = 921600

; Board-specific flags
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM=0
    -DMQTT_MAX_PACKET_SIZE=4096

; Libraries
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
    NimBLE-Arduino@^2.0
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    ; LittleFS is built into ESP32 Arduino framework 3.x — no external lib needed

lib_ignore = LittleFS_esp32

; Partition scheme with OTA support
board_build.partitions = min_spiffs.csv

; Serial monitor filters
monitor_filters = esp32_exception_decoder, time

[env:esp32s3]
extends       = env:esp32dev
board         = esp32-s3-devkitc-1
build_flags   =
    ${env:esp32dev.build_flags}
    -DBOARD_HAS_PSRAM=1
